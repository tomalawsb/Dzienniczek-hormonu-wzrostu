name: Publikacja PWA na GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja GitHub Pages
        uses: actions/configure-pages@v5

      - name: Przygotowanie plików
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publikacja
        id: deployment
        uses: actions/deploy-pages@v4
